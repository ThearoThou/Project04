<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div class="min-h-screen flex justify-center items-center">

        <form class="w-full h-auto max-w-xl mx-auto border border-black px-10 py-10 rounded rounded-3">
            <h1 class="font-bold text-2xl">ITC Library</h1>
            <p class="w-full font-bold text-3xl  text-center my-5">Sign In</p>

            <div class="w-full flex flex-col justify-center items-center gap-3">
                <div class="w-full">
                    <label for="email" class="block mb-2 text-sm font-medium black">Email</label>
                    <input
                        type="email"
                        id="email"
                        class="w-full border border-black black text-sm rounded rounded-base px-3 py-2.5"
                        placeholder="name@itc.com"
                        required
                    />
                </div>
                <div class="w-full mb-2">
                    <label for="password" class="block mb-2 text-sm font-medium black">Password</label>
                    <input
                        type="password"
                        id="password"
                        class="w-full border border-black black text-sm rounded rounded-base px-3 py-2.5"
                        placeholder="••••••••"
                        required
                    />
                </div>
                <div class="w-full flex justify-between items-start mb-2">
                    <label for="remember" class="w-1/2 flex items-center">
                        <input
                        id="remember"
                        type="checkbox"
                        class="w-4 h-4 border accent-accent rounded-xs"
                        required
                        />
                        <p class="ms-2 text-sm font-medium black select-none">Remember me</p>
                    </label>
                    <a href="" class="text-sm w-1/2 text-end hover:underline">Forget Password?</a>
                </div>
                <div class="w-full mb-10">
                    <button type="submit"
                        class="w-full mb-2 text-black bg-white border border-black hover:bg-black hover:text-white font-medium rounded rounded-base px-4 py-2.5">
                        Sign in
                    </button>
                    <span class="text-sm text-sm">Don't have an account?</span>
                    <a href="" class="text-sm font-bold hover:underline">Sign up</a>
                </div>
            </div>
        </form>
    </div>
</body>
</html>
