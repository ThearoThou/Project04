<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>All Borrow Records - Library Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body>
    <div th:replace="~{layout/navbar :: navbar}"></div>
    
    <div class="container mt-4">
        <h2><i class="bi bi-list-check"></i> All Borrow Records</h2>
        
        <div class="card mt-3">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover table-sm">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>User</th>
                                <th>Book Title</th>
                                <th>Author</th>
                                <th>Borrow Date</th>
                                <th>Return Deadline</th>
                                <th>Actual Return</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="record : ${borrowRecords}">
                                <td th:text="${record.id}"></td>
                                <td th:text="${record.user.username}"></td>
                                <td th:text="${record.book.title}"></td>
                                <td th:text="${record.book.author}"></td>
                                <td th:text="${#temporals.format(record.borrowDate, 'MMM dd, yyyy')}"></td>
                                <td th:text="${#temporals.format(record.returnDeadline, 'MMM dd, yyyy')}"></td>
                                <td>
                                    <span th:if="${record.actualReturnDate != null}" 
                                          th:text="${#temporals.format(record.actualReturnDate, 'MMM dd, yyyy')}"></span>
                                    <span th:if="${record.actualReturnDate == null}" class="text-muted">-</span>
                                </td>
                                <td>
                                    <span th:if="${record.status == 'BORROWED'}" 
                                          class="badge bg-primary">Borrowed</span>
                                    <span th:if="${record.status == 'RETURNED'}" 
                                          class="badge bg-success">Returned</span>
                                    <span th:if="${record.status == 'RETURNED_LATE'}" 
                                          class="badge bg-warning">Returned Late</span>
                                    <span th:if="${record.status == 'OVERDUE'}" 
                                          class="badge bg-danger">Overdue</span>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(borrowRecords)}">
                                <td colspan="8" class="text-center text-muted">No borrow records found.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <div class="mt-3">
            <div class="row">
                <div class="col-md-3">
                    <div class="card text-center">
                        <div class="card-body">
                            <h5 class="card-title text-primary" 
                                th:text="${#lists.size(#lists.select(borrowRecords, status == 'BORROWED'))}">0</h5>
                            <p class="card-text">Currently Borrowed</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card text-center">
                        <div class="card-body">
                            <h5 class="card-title text-danger" 
                                th:text="${#lists.size(#lists.select(borrowRecords, status == 'OVERDUE'))}">0</h5>
                            <p class="card-text">Overdue</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card text-center">
                        <div class="card-body">
                            <h5 class="card-title text-success" 
                                th:text="${#lists.size(#lists.select(borrowRecords, status == 'RETURNED'))}">0</h5>
                            <p class="card-text">Returned On Time</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card text-center">
                        <div class="card-body">
                            <h5 class="card-title text-warning" 
                                th:text="${#lists.size(#lists.select(borrowRecords, status == 'RETURNED_LATE'))}">0</h5>
                            <p class="card-text">Returned Late</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
